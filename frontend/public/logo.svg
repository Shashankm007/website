<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 64" width="268" height="64" role="img" aria-label="HashTag Creations">
  <defs>
    <linearGradient id="lgTile" x1="6" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="lgSpark" x1="62" y1="2" x2="38" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="lgClip"><rect x="2" y="2" width="60" height="60" rx="16"/></clipPath>
  </defs>

  <!-- icon mark -->
  <g clip-path="url(#lgClip)">
    <rect x="2" y="2" width="60" height="60" fill="url(#lgTile)"/>
    <path d="M62 2 L62 28 L36 2 Z" fill="url(#lgSpark)"/>
    <rect x="2" y="2" width="60" height="26" fill="#ffffff" opacity="0.07"/>
  </g>
  <g fill="#312e81" opacity="0.4" transform="translate(1.4,2.2)">
    <rect x="21" y="14" width="6" height="36" rx="3"/>
    <rect x="37" y="14" width="6" height="36" rx="3"/>
    <rect x="14" y="21" width="36" height="6" rx="3"/>
    <rect x="14" y="37" width="36" height="6" rx="3"/>
  </g>
  <g fill="#ffffff">
    <rect x="21" y="14" width="6" height="36" rx="3"/>
    <rect x="37" y="14" width="6" height="36" rx="3"/>
    <rect x="14" y="21" width="36" height="6" rx="3"/>
    <rect x="14" y="37" width="36" height="6" rx="3"/>
  </g>

  <!-- wordmark -->
  <text x="78" y="30" font-family="'Poppins','Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="23" font-weight="700" letter-spacing="-0.3" fill="#312e81">HashTag</text>
  <text x="79" y="48" font-family="'Poppins','Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="11.5" font-weight="600" letter-spacing="4.5" fill="#64748b">CREATIONS</text>
