<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="HashTag Creations">
  <defs>
    <linearGradient id="htTile" x1="6" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="htSpark" x1="62" y1="2" x2="38" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="htClip"><rect x="2" y="2" width="60" height="60" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#htClip)">
    <rect x="2" y="2" width="60" height="60" fill="url(#htTile)"/>
    <!-- warm "forge" spark in the top-right corner -->
    <path d="M62 2 L62 28 L36 2 Z" fill="url(#htSpark)"/>
    <!-- soft top sheen -->
    <rect x="2" y="2" width="60" height="26" fill="#ffffff" opacity="0.07"/>
  </g>

  <!-- extruded depth (offset, darker) — a 3D-printed feel -->
  <g fill="#312e81" opacity="0.4" transform="translate(1.4,2.2)">
    <rect x="21" y="14" width="6" height="36" rx="3"/>
    <rect x="37" y="14" width="6" height="36" rx="3"/>
    <rect x="14" y="21" width="36" height="6" rx="3"/>
    <rect x="14" y="37" width="36" height="6" rx="3"/>
  </g>

  <!-- hashtag mark -->
  <g fill="#ffffff">
    <rect x="21" y="14" width="6" height="36" rx="3"/>
    <rect x="37" y="14" width="6" height="36" rx="3"/>
    <rect x="14" y="21" width="36" height="6" rx="3"/>
    <rect x="14" y="37" width="36" height="6" rx="3"/>
  </g>
</svg>
